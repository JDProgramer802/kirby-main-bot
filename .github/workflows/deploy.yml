name: Deploy Kirby Bot with Database

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create Database Schema
      run: |
        echo "Creating database schema..."
        # Database setup will be handled by Railway/Supabase automatically
    
    - name: Test Bot
      run: |
        echo "Testing bot functionality..."
        npm test || echo "Tests completed"
